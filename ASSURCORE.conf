# =============================================================================
# Configuration Apache (httpd) de Production - Sécurisée & Optimisée
# Fichier : ASSURCORE.conf
# Destination VPS : /etc/httpd/conf.d/assurcore.conf (ou /etc/apache2/sites-available/)
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 1. HÔTE VIRTUEL : Port 80 (HTTP) → Redirection Automatique vers HTTPS
# ─────────────────────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName assurcore.metadidomi.com
    ServerAlias www.assurcore.metadidomi.com
    
    # Redirection automatique et permanente vers HTTPS (SaaS / SSL Strict)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# ─────────────────────────────────────────────────────────────────────────────
# 2. HÔTE VIRTUEL : Port 443 (HTTPS) → Reverse Proxy Odoo 17 (AssurCore)
# ─────────────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName assurcore.metadidomi.com
    ServerAlias www.assurcore.metadidomi.com
    
    # Logfiles (Dossiers standards CentOS/RHEL httpd, ajuster si Debian/Ubuntu)
    ErrorLog /var/log/httpd/assurcore_prod_error_log
    CustomLog /var/log/httpd/assurcore_prod_access_log combined

    # SSL Configuration (Certificats Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/assurcore.metadidomi.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/assurcore.metadidomi.com/privkey.pem

    # Recommandations de sécurité SSL modernes (Mozilla SSL Configuration Generator)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # ── PARAMÈTRES DU REVERSE PROXY ──
    ProxyPreserveHost On
    ProxyRequests Off

    # Transmission des headers indispensables pour Odoo 17
    # (Évite les boucles de redirection HTTPS infinies)
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # ── 1. ROUTAGE ODOO 17 WEBSOCKETS (Longpolling / Chat en temps réel) ──
    # Règle critique pour éviter le bandeau rouge "Déconnecté" et stabiliser le chat
    ProxyPass /websocket ws://localhost:8071/websocket
    ProxyPassReverse /websocket ws://localhost:8071/websocket

    # ── 2. SÉCURISATION DE L'INTERFACE BASE DE DONNÉES EN PRODUCTION ──
    # Bloque l'accès externe à la création / suppression de bases de données
    <Location /web/database/manager>
        Require ip 127.0.0.1
    </Location>
    <Location /web/database/selector>
        Require ip 127.0.0.1
    </Location>

    # ── 3. ROUTAGE GÉNÉRAL VERS ODOO 17 / ASSURCORE (Port 8071) ──
    # Redirige toutes les requêtes (y compris la racine) vers le Odoo d'AssurCore
    ProxyPass / http://localhost:8071/
    ProxyPassReverse / http://localhost:8071/

</VirtualHost>
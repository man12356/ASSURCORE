; ==============================================================================
;  odoo.conf -- Configuration Odoo 17.0 AssurCore (Docker local Windows)
;
;  Monte dans le container via : ./config:/etc/odoo -> /etc/odoo/odoo.conf
; ==============================================================================

[options]

; -- Connexion base de donnees ------------------------------------------------
; 'db' est resolu par le DNS interne Docker (service name dans compose)
db_host     = db
db_port     = 5432
db_user     = odoo
db_password = odoo

; CORRECTION CRITIQUE :
; db_name = False  --> Odoo cherche n'importe quelle base dispo (prend postgres_system) ERROR
; db_name = assurcore_db --> Odoo cree ET initialise automatiquement cette base OK
;
; Au 1er demarrage : Odoo installe le module 'base' (3-8 min). C'est NORMAL.
; Les logs affichent des erreurs pendant ce temps -- ignorer jusqu'a :
;   "odoo.modules.loading: Modules loaded."
db_name     = assurcore_db

; Securite : Odoo ne touchera jamais 'postgres_system' ou autre base systeme
db_filter   = ^assurcore.*$

; -- Modules et chemins -------------------------------------------------------
; /mnt/extra-addons = volume Docker -> ./addons (contient assurcore)
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; -- Serveur HTTP -------------------------------------------------------------
xmlrpc_interface = 0.0.0.0
xmlrpc_port      = 8069
longpolling_port = 8072

; -- Performance (developpement local) ----------------------------------------
; workers = 0 : mode mono-thread. Adapte au dev. Mettre 2-4 en production.
workers = 2

; -- Logs ---------------------------------------------------------------------
log_level   = info
log_handler = :INFO
logfile     = False

; -- Securite -----------------------------------------------------------------
admin_passwd = AssurProdSecret2026!
list_db = False

; -- Proxy (Nginx/Apache devant Odoo) ----------------------------------------
proxy_mode = True
